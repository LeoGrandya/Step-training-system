<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Sport Lab - 分析中</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#2563EB',
                        'tech-cyan': '#00D4FF',
                        'accent-orange': '#FF6B00',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'error': '#EF4444',
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        html, body { height: 100%; overflow-x: hidden; background: #f1f5f9; }
        body { display: flex; flex-direction: column; min-height: 100vh; }

        :root {
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
        }

        .loading-container {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .loading-card {
            background: white;
            border-radius: 20px;
            padding: 48px;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .loading-spinner {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            position: relative;
        }

        .loading-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: spin 1.5s linear infinite;
        }

        .loading-ring-1 {
            width: 120px;
            height: 120px;
            border-top-color: #00D4FF;
            animation-duration: 1.5s;
        }

        .loading-ring-2 {
            width: 100px;
            height: 100px;
            top: 10px;
            left: 10px;
            border-right-color: #FF6B00;
            animation-duration: 1.2s;
        }

        .loading-ring-3 {
            width: 80px;
            height: 80px;
            top: 20px;
            left: 20px;
            border-bottom-color: #10B981;
            animation-duration: 1s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00D4FF, #FF6B00);
            border-radius: 4px;
            transition: width 300ms;
        }

        .status-text {
            font-size: 16px;
            font-weight: 600;
            color: #00D4FF;
            margin: 16px 0 4px;
        }

        .loading-eta {
            font-size: 13px;
            color: #94A3B8;
            margin-bottom: 8px;
        }

        .percent-text {
            font-size: 48px;
            font-weight: 800;
            color: #0F172A;
        }

        .cancel-btn {
            background: none;
            border: none;
            color: #94A3B8;
            font-size: 14px;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Toast */
        .toast-host {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast-item {
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.35;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: toast-in 160ms ease;
        }

        .toast-item.info { background: #2c6e9e; }
        .toast-item.success { background: #238a63; }
        .toast-item.warn { background: #c27a1d; }
        .toast-item.error { background: #b9413b; }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">
    <div id="site-nav"></div>

    <!-- ===== Loading 页面 ===== -->
    <div class="loading-container">
        <div class="loading-card">
            <div style="font-family: var(--font-mono); font-size: 14px; color: #64748B; margin-bottom: 24px;" id="loading-filename">
                选择视频文件.mp4
            </div>
            <div class="loading-spinner">
                <div class="loading-ring loading-ring-1"></div>
                <div class="loading-ring loading-ring-2"></div>
                <div class="loading-ring loading-ring-3"></div>
                <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px;">⚡</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="loading-progress"></div>
            </div>
            <div class="status-text" id="loading-status">正在上传视频至云端...</div>
            <div id="loading-eta" class="loading-eta">正在估算剩余时间…</div>
            <div class="percent-text" id="loading-percent">0%</div>
            <button class="cancel-btn" onclick="cancelAnalysis()">取消分析</button>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-host" id="toastHost"></div>
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/analysisJobMonitor.js" defer></script>
    <script src="assets/js/pages/loading.js" defer></script>
</body>
</html>
